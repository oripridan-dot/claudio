name: Claudio CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cpp-build:
    name: C++ DSP Engine Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Mutex Audit (SpatialLatencyGate)
        run: |
          ! grep -rn 'std::mutex\|std::lock_guard\|std::condition_variable' dsp/spatial/*.hpp dsp/spatial/*.cpp || exit 1

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Security audit
        run: uv run pip-audit
      - name: Test
        run: uv run pytest tests/ -v --tb=short
